
{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-5 m-auto ">
            <br>
            <h3>Monthly BERC Information</h3>
            <br>
            {% if message %}
            {{ message }}
            {% endif %}
            <form method="POST">
                {% csrf_token %}
                {{berc_form.as_p}}
                
                <button type="submit" class="btn btn-dark">Submit</button>
            </form>
            
        </div>
    </div>
</div>
{% endblock %}
