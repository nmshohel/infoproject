
{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-5 m-auto ">
            <br>
            <h3>বকেয়ার কারণে বিচ্ছিন্নকৃত শিল্প/বানিজ্যিক গ্রাহকের পুনঃসংযোগ সংক্রান্ত</h3>
            <br>
            {% if message %}
            <div class="alert alert-success" role="alert">
                {{ message }}
              </div>
              {% endif %}

            <form method="POST">
                {% csrf_token %}
                {{new_form.as_p}}
                
                <button type="submit" class="btn btn-dark">Submit</button>
            </form>
            
        </div>
    </div>
</div>
{% endblock %}
